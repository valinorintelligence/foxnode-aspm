  <!-- ═══════════ PARSER ENGINE ═══════════ -->
  <rect x="380" y="232" width="440" height="50" rx="10" fill="url(#foxnodeGrad)" filter="url(#glow)"/>
  <text x="600" y="254" text-anchor="middle" fill="white" font-size="13" font-weight="700">Parser Engine — 16 Parsers</text>
  <text x="600" y="272" text-anchor="middle" fill="#e0f2fe" font-size="10">Auto-detect format · Normalize · Deduplicate</text>

