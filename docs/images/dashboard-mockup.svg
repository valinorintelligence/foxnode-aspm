<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 820" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bgG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#030712"/>
      <stop offset="100%" style="stop-color:#0a0f1a"/>
    </linearGradient>
    <linearGradient id="foxG" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0c8ee9"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <linearGradient id="pieRed" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#dc2626"/>
      <stop offset="100%" style="stop-color:#ef4444"/>
    </linearGradient>
    <filter id="ds">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <clipPath id="mainClip"><rect x="0" y="0" width="1280" height="820" rx="16"/></clipPath>
  </defs>

  <g clip-path="url(#mainClip)">
    <!-- App Background -->
    <rect width="1280" height="820" fill="url(#bgG)"/>

    <!-- ═══════ SIDEBAR ═══════ -->
    <rect x="0" y="0" width="240" height="820" fill="#111827" stroke="#1f2937" stroke-width="1"/>

    <!-- Logo -->
    <rect x="24" y="18" width="36" height="36" rx="8" fill="#0c8ee9"/>
    <text x="42" y="42" text-anchor="middle" fill="white" font-size="18" font-weight="700">F</text>
    <text x="72" y="35" fill="white" font-size="17" font-weight="700">Foxnode</text>
    <text x="72" y="50" fill="#6b7280" font-size="8" letter-spacing="2" text-transform="uppercase">ASPM PLATFORM</text>

    <!-- Separator -->
    <line x1="24" y1="68" x2="216" y2="68" stroke="#1f2937" stroke-width="1"/>

    <!-- Nav Items -->
    <!-- Active: Dashboard -->
    <rect x="12" y="82" width="216" height="40" rx="8" fill="#0c8ee9" fill-opacity="0.12" stroke="#0c8ee9" stroke-opacity="0.25" stroke-width="1"/>
    <rect x="28" y="94" width="16" height="16" rx="3" fill="none" stroke="#0c8ee9" stroke-width="1.5"/>
    <rect x="30" y="96" width="5" height="5" rx="1" fill="#0c8ee9"/>
    <rect x="37" y="96" width="5" height="5" rx="1" fill="#0c8ee9"/>
    <rect x="30" y="103" width="5" height="5" rx="1" fill="#0c8ee9"/>
    <rect x="37" y="103" width="5" height="5" rx="1" fill="#0c8ee9"/>
    <text x="56" y="107" fill="#38bdf8" font-size="13" font-weight="600">Dashboard</text>

    <!-- Products -->
    <text x="56" y="148" fill="#9ca3af" font-size="13">Products</text>
    <rect x="28" y="135" width="16" height="16" rx="3" fill="none" stroke="#6b7280" stroke-width="1.2"/>

    <!-- Findings -->
    <text x="56" y="188" fill="#9ca3af" font-size="13">Findings</text>
    <circle cx="36" cy="183" r="7" fill="none" stroke="#6b7280" stroke-width="1.2"/>
    <text x="36" y="187" text-anchor="middle" fill="#6b7280" font-size="8">!</text>

    <!-- Engagements -->
    <text x="56" y="228" fill="#9ca3af" font-size="13">Engagements</text>

    <!-- Integrations -->
    <text x="56" y="268" fill="#9ca3af" font-size="13">Integrations</text>

    <!-- Import Scans -->
    <text x="56" y="308" fill="#9ca3af" font-size="13">Import Scans</text>

    <!-- Settings at bottom -->
    <line x1="24" y1="738" x2="216" y2="738" stroke="#1f2937" stroke-width="1"/>
    <text x="56" y="768" fill="#9ca3af" font-size="13">Settings</text>

    <!-- Version -->
    <text x="120" y="800" text-anchor="middle" fill="#374151" font-size="10">Foxnode ASPM v1.0.0</text>

    <!-- ═══════ HEADER ═══════ -->
    <rect x="240" y="0" width="1040" height="60" fill="#111827" stroke="#1f2937" stroke-width="1"/>
    <text x="268" y="35" fill="#9ca3af" font-size="12">Application Security Posture Management</text>

    <!-- Notification bell -->
    <circle cx="1180" cy="30" r="14" fill="none" stroke="#374151" stroke-width="1"/>
    <text x="1180" y="35" text-anchor="middle" fill="#9ca3af" font-size="12">🔔</text>
    <circle cx="1188" cy="22" r="4" fill="#ef4444"/>

    <!-- User avatar -->
    <circle cx="1224" cy="30" r="14" fill="#0c8ee9" fill-opacity="0.2"/>
    <text x="1224" y="35" text-anchor="middle" fill="#38bdf8" font-size="11" font-weight="600">AM</text>

    <!-- ═══════ MAIN CONTENT ═══════ -->
    <rect x="240" y="60" width="1040" height="760" fill="#030712"/>

    <!-- Page Title -->
    <text x="272" y="100" fill="white" font-size="20" font-weight="700">Security Dashboard</text>
    <text x="272" y="120" fill="#6b7280" font-size="12">Overview of your application security posture</text>

    <!-- ═══════ STAT CARDS ═══════ -->
    <!-- Total Findings -->
    <rect x="272" y="140" width="230" height="85" rx="12" fill="#111827" stroke="#1f2937" stroke-width="1" filter="url(#ds)"/>
    <rect x="290" y="158" width="44" height="44" rx="10" fill="#0c8ee9" fill-opacity="0.1"/>
    <text x="312" y="186" text-anchor="middle" fill="#0c8ee9" font-size="18">⚡</text>
    <text x="350" y="174" fill="#6b7280" font-size="11">Total Findings</text>
    <text x="350" y="200" fill="white" font-size="24" font-weight="700">2,847</text>

    <!-- Critical -->
    <rect x="518" y="140" width="230" height="85" rx="12" fill="#111827" stroke="#1f2937" stroke-width="1" filter="url(#ds)"/>
    <rect x="536" y="158" width="44" height="44" rx="10" fill="#dc2626" fill-opacity="0.1"/>
    <text x="558" y="186" text-anchor="middle" fill="#dc2626" font-size="18">🛡</text>
    <text x="596" y="174" fill="#6b7280" font-size="11">Critical</text>
    <text x="596" y="200" fill="white" font-size="24" font-weight="700">127</text>

    <!-- High -->
    <rect x="764" y="140" width="230" height="85" rx="12" fill="#111827" stroke="#1f2937" stroke-width="1" filter="url(#ds)"/>
    <rect x="782" y="158" width="44" height="44" rx="10" fill="#ea580c" fill-opacity="0.1"/>
    <text x="804" y="186" text-anchor="middle" fill="#ea580c" font-size="18">⚠</text>
    <text x="842" y="174" fill="#6b7280" font-size="11">High</text>
    <text x="842" y="200" fill="white" font-size="24" font-weight="700">384</text>

    <!-- Products -->
    <rect x="1010" y="140" width="230" height="85" rx="12" fill="#111827" stroke="#1f2937" stroke-width="1" filter="url(#ds)"/>
    <rect x="1028" y="158" width="44" height="44" rx="10" fill="#10b981" fill-opacity="0.1"/>
    <text x="1050" y="186" text-anchor="middle" fill="#10b981" font-size="18">📦</text>
    <text x="1088" y="174" fill="#6b7280" font-size="11">Products</text>
    <text x="1088" y="200" fill="white" font-size="24" font-weight="700">24</text>

    <!-- ═══════ CHARTS ROW ═══════ -->
    <!-- Severity Pie Chart -->
    <rect x="272" y="245" width="488" height="270" rx="12" fill="#111827" stroke="#1f2937" stroke-width="1" filter="url(#ds)"/>
    <text x="296" y="275" fill="white" font-size="14" font-weight="600">Findings by Severity</text>

    <!-- Donut Chart -->
    <g transform="translate(430, 390)">
      <!-- Critical - red arc -->
      <circle cx="0" cy="0" r="75" fill="none" stroke="#dc2626" stroke-width="28" stroke-dasharray="42 430" stroke-dashoffset="0" transform="rotate(-90)"/>
      <!-- High - orange arc -->
      <circle cx="0" cy="0" r="75" fill="none" stroke="#ea580c" stroke-width="28" stroke-dasharray="85 387" stroke-dashoffset="-42" transform="rotate(-90)"/>
      <!-- Medium - yellow arc -->
      <circle cx="0" cy="0" r="75" fill="none" stroke="#d97706" stroke-width="28" stroke-dasharray="140 332" stroke-dashoffset="-127" transform="rotate(-90)"/>
      <!-- Low - blue arc -->
      <circle cx="0" cy="0" r="75" fill="none" stroke="#2563eb" stroke-width="28" stroke-dasharray="120 352" stroke-dashoffset="-267" transform="rotate(-90)"/>
      <!-- Info - gray arc -->
      <circle cx="0" cy="0" r="75" fill="none" stroke="#6b7280" stroke-width="28" stroke-dasharray="85 387" stroke-dashoffset="-387" transform="rotate(-90)"/>
      <!-- Center -->
      <circle cx="0" cy="0" r="50" fill="#111827"/>
      <text x="0" y="-5" text-anchor="middle" fill="white" font-size="20" font-weight="700">2,847</text>
      <text x="0" y="14" text-anchor="middle" fill="#6b7280" font-size="10">Total</text>
    </g>

    <!-- Legend -->
    <g transform="translate(555, 340)">
      <circle cx="0" cy="0" r="5" fill="#dc2626"/>
      <text x="14" y="4" fill="#9ca3af" font-size="11">Critical: 127</text>
      <circle cx="0" cy="25" r="5" fill="#ea580c"/>
      <text x="14" y="29" fill="#9ca3af" font-size="11">High: 384</text>
      <circle cx="0" cy="50" r="5" fill="#d97706"/>
      <text x="14" y="54" fill="#9ca3af" font-size="11">Medium: 892</text>
      <circle cx="0" cy="75" r="5" fill="#2563eb"/>
      <text x="14" y="79" fill="#9ca3af" font-size="11">Low: 756</text>
      <circle cx="0" cy="100" r="5" fill="#6b7280"/>
      <text x="14" y="104" fill="#9ca3af" font-size="11">Info: 688</text>
    </g>

    <!-- Scanner Bar Chart -->
    <rect x="776" y="245" width="464" height="270" rx="12" fill="#111827" stroke="#1f2937" stroke-width="1" filter="url(#ds)"/>
    <text x="800" y="275" fill="white" font-size="14" font-weight="600">Findings by Scanner</text>

    <!-- Horizontal bars -->
    <g transform="translate(800, 295)">
      <text x="0" y="14" fill="#9ca3af" font-size="10">Semgrep</text>
      <rect x="90" y="2" width="280" height="18" rx="4" fill="#0c8ee9" fill-opacity="0.15"/>
      <rect x="90" y="2" width="260" height="18" rx="4" fill="#0c8ee9"/>
      <text x="360" y="15" fill="#9ca3af" font-size="10">842</text>

      <text x="0" y="44" fill="#9ca3af" font-size="10">Trivy</text>
      <rect x="90" y="32" width="280" height="18" rx="4" fill="#0c8ee9" fill-opacity="0.15"/>
      <rect x="90" y="32" width="200" height="18" rx="4" fill="#0c8ee9"/>
      <text x="300" y="45" fill="#9ca3af" font-size="10">623</text>

      <text x="0" y="74" fill="#9ca3af" font-size="10">Snyk</text>
      <rect x="90" y="62" width="280" height="18" rx="4" fill="#0c8ee9" fill-opacity="0.15"/>
      <rect x="90" y="62" width="155" height="18" rx="4" fill="#0c8ee9"/>
      <text x="255" y="75" fill="#9ca3af" font-size="10">489</text>

      <text x="0" y="104" fill="#9ca3af" font-size="10">Bandit</text>
      <rect x="90" y="92" width="280" height="18" rx="4" fill="#0c8ee9" fill-opacity="0.15"/>
      <rect x="90" y="92" width="110" height="18" rx="4" fill="#0c8ee9"/>
      <text x="210" y="105" fill="#9ca3af" font-size="10">341</text>

      <text x="0" y="134" fill="#9ca3af" font-size="10">ZAP</text>
      <rect x="90" y="122" width="280" height="18" rx="4" fill="#0c8ee9" fill-opacity="0.15"/>
      <rect x="90" y="122" width="85" height="18" rx="4" fill="#0c8ee9"/>
      <text x="185" y="135" fill="#9ca3af" font-size="10">267</text>

      <text x="0" y="164" fill="#9ca3af" font-size="10">Checkov</text>
      <rect x="90" y="152" width="280" height="18" rx="4" fill="#0c8ee9" fill-opacity="0.15"/>
      <rect x="90" y="152" width="60" height="18" rx="4" fill="#0c8ee9"/>
      <text x="160" y="165" fill="#9ca3af" font-size="10">185</text>

      <text x="0" y="194" fill="#9ca3af" font-size="10">Gitleaks</text>
      <rect x="90" y="182" width="280" height="18" rx="4" fill="#0c8ee9" fill-opacity="0.15"/>
      <rect x="90" y="182" width="32" height="18" rx="4" fill="#0c8ee9"/>
      <text x="132" y="195" fill="#9ca3af" font-size="10">100</text>
    </g>

    <!-- ═══════ RECENT FINDINGS TABLE ═══════ -->
    <rect x="272" y="535" width="968" height="265" rx="12" fill="#111827" stroke="#1f2937" stroke-width="1" filter="url(#ds)"/>
    <text x="296" y="565" fill="white" font-size="14" font-weight="600">Recent Findings</text>

    <!-- Table header -->
    <rect x="272" y="580" width="968" height="32" fill="#1f2937" fill-opacity="0.5"/>
    <text x="296" y="600" fill="#6b7280" font-size="10" font-weight="600">SEVERITY</text>
    <text x="400" y="600" fill="#6b7280" font-size="10" font-weight="600">TITLE</text>
    <text x="780" y="600" fill="#6b7280" font-size="10" font-weight="600">SCANNER</text>
    <text x="920" y="600" fill="#6b7280" font-size="10" font-weight="600">STATUS</text>
    <text x="1060" y="600" fill="#6b7280" font-size="10" font-weight="600">CVSS</text>

    <!-- Row 1 -->
    <rect x="290" y="623" width="56" height="20" rx="10" fill="#dc2626" fill-opacity="0.15" stroke="#dc2626" stroke-opacity="0.3" stroke-width="0.8"/>
    <text x="318" y="637" text-anchor="middle" fill="#f87171" font-size="9" font-weight="600">Critical</text>
    <text x="400" y="637" fill="#e5e7eb" font-size="11">SQL Injection in /api/users endpoint</text>
    <text x="780" y="637" fill="#9ca3af" font-size="11">Semgrep</text>
    <text x="920" y="637" fill="#9ca3af" font-size="11">Active</text>
    <text x="1060" y="637" fill="#f87171" font-size="11" font-weight="600">9.8</text>

    <!-- Row 2 -->
    <line x1="282" y1="650" x2="1230" y2="650" stroke="#1f2937" stroke-width="0.5"/>
    <rect x="290" y="660" width="56" height="20" rx="10" fill="#ea580c" fill-opacity="0.15" stroke="#ea580c" stroke-opacity="0.3" stroke-width="0.8"/>
    <text x="318" y="674" text-anchor="middle" fill="#fb923c" font-size="9" font-weight="600">High</text>
    <text x="400" y="674" fill="#e5e7eb" font-size="11">Hardcoded AWS credentials in config.py</text>
    <text x="780" y="674" fill="#9ca3af" font-size="11">Gitleaks</text>
    <text x="920" y="674" fill="#9ca3af" font-size="11">Verified</text>
    <text x="1060" y="674" fill="#fb923c" font-size="11" font-weight="600">8.6</text>

    <!-- Row 3 -->
    <line x1="282" y1="688" x2="1230" y2="688" stroke="#1f2937" stroke-width="0.5"/>
    <rect x="290" y="698" width="56" height="20" rx="10" fill="#ea580c" fill-opacity="0.15" stroke="#ea580c" stroke-opacity="0.3" stroke-width="0.8"/>
    <text x="318" y="712" text-anchor="middle" fill="#fb923c" font-size="9" font-weight="600">High</text>
    <text x="400" y="712" fill="#e5e7eb" font-size="11">CVE-2024-3094: xz-utils backdoor vulnerability</text>
    <text x="780" y="712" fill="#9ca3af" font-size="11">Trivy</text>
    <text x="920" y="712" fill="#9ca3af" font-size="11">Active</text>
    <text x="1060" y="712" fill="#fb923c" font-size="11" font-weight="600">8.2</text>

    <!-- Row 4 -->
    <line x1="282" y1="726" x2="1230" y2="726" stroke="#1f2937" stroke-width="0.5"/>
    <rect x="290" y="736" width="64" height="20" rx="10" fill="#d97706" fill-opacity="0.15" stroke="#d97706" stroke-opacity="0.3" stroke-width="0.8"/>
    <text x="322" y="750" text-anchor="middle" fill="#fbbf24" font-size="9" font-weight="600">Medium</text>
    <text x="400" y="750" fill="#e5e7eb" font-size="11">Missing Content-Security-Policy header</text>
    <text x="780" y="750" fill="#9ca3af" font-size="11">ZAP</text>
    <text x="920" y="750" fill="#9ca3af" font-size="11">Active</text>
    <text x="1060" y="750" fill="#fbbf24" font-size="11" font-weight="600">5.3</text>

    <!-- Row 5 -->
    <line x1="282" y1="764" x2="1230" y2="764" stroke="#1f2937" stroke-width="0.5"/>
    <rect x="290" y="774" width="42" height="20" rx="10" fill="#2563eb" fill-opacity="0.15" stroke="#2563eb" stroke-opacity="0.3" stroke-width="0.8"/>
    <text x="311" y="788" text-anchor="middle" fill="#60a5fa" font-size="9" font-weight="600">Low</text>
    <text x="400" y="788" fill="#e5e7eb" font-size="11">Terraform S3 bucket missing versioning</text>
    <text x="780" y="788" fill="#9ca3af" font-size="11">Checkov</text>
    <text x="920" y="788" fill="#9ca3af" font-size="11">Active</text>
    <text x="1060" y="788" fill="#60a5fa" font-size="11" font-weight="600">3.1</text>
  </g>
</svg>
