  <line x1="400" y1="532" x2="400" y2="570" stroke="#10b981" stroke-width="2" marker-end="url(#arrowGreen)"/>

  <rect x="240" y="572" width="180" height="70" rx="10" fill="#1f2937" stroke="#10b981" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="330" y="600" text-anchor="middle" fill="#34d399" font-size="13" font-weight="700">PostgreSQL</text>
  <text x="330" y="620" text-anchor="middle" fill="#6b7280" font-size="10">Products · Findings · Users</text>

  <rect x="460" y="572" width="180" height="70" rx="10" fill="#1f2937" stroke="#ef4444" stroke-width="1.5" filter="url(#shadow)"/>
