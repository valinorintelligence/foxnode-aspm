<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 850" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0f1a"/>
      <stop offset="100%" style="stop-color:#111827"/>
    </linearGradient>
    <linearGradient id="foxnodeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0c8ee9"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1f2937"/>
      <stop offset="100%" style="stop-color:#111827"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="850" fill="url(#bgGrad)"/>

  <!-- Grid pattern -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1f2937" stroke-width="0.5"/>
  </pattern>
  <rect width="1200" height="850" fill="url(#grid)" opacity="0.3"/>

  <!-- Title -->
  <text x="600" y="45" text-anchor="middle" fill="white" font-size="22" font-weight="700">Foxnode ASPM — System Architecture</text>
  <text x="600" y="68" text-anchor="middle" fill="#6b7280" font-size="13">Application Security Posture Management Platform</text>

  <!-- ═══════════ SECURITY TOOLS (TOP) ═══════════ -->
  <rect x="40" y="90" width="1120" height="110" rx="12" fill="#1f2937" stroke="#374151" stroke-width="1" filter="url(#shadow)"/>
  <text x="600" y="115" text-anchor="middle" fill="#9ca3af" font-size="11" font-weight="600" letter-spacing="2">SECURITY SCANNERS &amp; TOOLS</text>

  <!-- Tool boxes -->
  <g>
    <rect x="65" y="128" width="105" height="52" rx="8" fill="#7c3aed" fill-opacity="0.15" stroke="#7c3aed" stroke-width="1"/>
    <text x="117" y="150" text-anchor="middle" fill="#a78bfa" font-size="10" font-weight="600">SAST</text>
    <text x="117" y="168" text-anchor="middle" fill="#6b7280" font-size="9">Semgrep, Bandit</text>
  </g>
  <g>
    <rect x="185" y="128" width="105" height="52" rx="8" fill="#ef4444" fill-opacity="0.15" stroke="#ef4444" stroke-width="1"/>
    <text x="237" y="150" text-anchor="middle" fill="#f87171" font-size="10" font-weight="600">DAST</text>
    <text x="237" y="168" text-anchor="middle" fill="#6b7280" font-size="9">ZAP, Nuclei</text>
  </g>
  <g>
    <rect x="305" y="128" width="105" height="52" rx="8" fill="#3b82f6" fill-opacity="0.15" stroke="#3b82f6" stroke-width="1"/>
    <text x="357" y="150" text-anchor="middle" fill="#60a5fa" font-size="10" font-weight="600">SCA</text>
    <text x="357" y="168" text-anchor="middle" fill="#6b7280" font-size="9">Snyk, Trivy, DC</text>
  </g>
  <g>
    <rect x="425" y="128" width="105" height="52" rx="8" fill="#06b6d4" fill-opacity="0.15" stroke="#06b6d4" stroke-width="1"/>
    <text x="477" y="150" text-anchor="middle" fill="#22d3ee" font-size="10" font-weight="600">IaC</text>
    <text x="477" y="168" text-anchor="middle" fill="#6b7280" font-size="9">Checkov, tfsec</text>
  </g>
  <g>
    <rect x="545" y="128" width="105" height="52" rx="8" fill="#f59e0b" fill-opacity="0.15" stroke="#f59e0b" stroke-width="1"/>
    <text x="597" y="150" text-anchor="middle" fill="#fbbf24" font-size="10" font-weight="600">Secrets</text>
    <text x="597" y="168" text-anchor="middle" fill="#6b7280" font-size="9">Gitleaks, TruffleHog</text>
  </g>
  <g>
    <rect x="665" y="128" width="105" height="52" rx="8" fill="#10b981" fill-opacity="0.15" stroke="#10b981" stroke-width="1"/>
    <text x="717" y="150" text-anchor="middle" fill="#34d399" font-size="10" font-weight="600">Cloud</text>
    <text x="717" y="168" text-anchor="middle" fill="#6b7280" font-size="9">Prowler</text>
  </g>
  <g>
    <rect x="785" y="128" width="105" height="52" rx="8" fill="#ec4899" fill-opacity="0.15" stroke="#ec4899" stroke-width="1"/>
    <text x="837" y="150" text-anchor="middle" fill="#f472b6" font-size="10" font-weight="600">SAST</text>
    <text x="837" y="168" text-anchor="middle" fill="#6b7280" font-size="9">SonarQube</text>
  </g>
  <g>
    <rect x="905" y="128" width="105" height="52" rx="8" fill="#8b5cf6" fill-opacity="0.15" stroke="#8b5cf6" stroke-width="1"/>
    <text x="957" y="150" text-anchor="middle" fill="#a78bfa" font-size="10" font-weight="600">Universal</text>
    <text x="957" y="168" text-anchor="middle" fill="#6b7280" font-size="9">SARIF Format</text>
  </g>
  <g>
    <rect x="1025" y="128" width="115" height="52" rx="8" fill="#6b7280" fill-opacity="0.15" stroke="#6b7280" stroke-width="1"/>
    <text x="1082" y="150" text-anchor="middle" fill="#9ca3af" font-size="10" font-weight="600">Generic</text>
    <text x="1082" y="168" text-anchor="middle" fill="#6b7280" font-size="9">JSON / CSV</text>
  </g>

  <!-- Down arrows from tools -->
  <line x1="600" y1="200" x2="600" y2="230" stroke="#0c8ee9" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <defs>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0c8ee9"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#10b981"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b"/>
    </marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8b5cf6"/>
    </marker>
    <marker id="arrowGray" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6b7280"/>
    </marker>
