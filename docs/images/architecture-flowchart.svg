    <text x="667" y="493" text-anchor="middle" fill="#6b7280" font-size="9">Slack webhooks</text>
  </g>
  <g>
    <rect x="745" y="450" width="125" height="60" rx="8" fill="#0c8ee9" fill-opacity="0.1" stroke="#0c8ee9" stroke-width="1"/>
    <text x="807" y="474" text-anchor="middle" fill="#38bdf8" font-size="11" font-weight="600">Users API</text>
    <text x="807" y="493" text-anchor="middle" fill="#6b7280" font-size="9">Manage · Roles</text>
  </g>

