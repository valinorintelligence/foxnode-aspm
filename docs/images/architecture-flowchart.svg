    <text x="387" y="493" text-anchor="middle" fill="#6b7280" font-size="9">30+ tools</text>
  </g>
  <g>
    <rect x="465" y="450" width="125" height="60" rx="8" fill="#8b5cf6" fill-opacity="0.1" stroke="#8b5cf6" stroke-width="1"/>
