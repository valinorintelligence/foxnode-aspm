  <text x="600" y="340" text-anchor="middle" fill="white" font-size="15" font-weight="700">FastAPI Backend</text>
  <text x="600" y="358" text-anchor="middle" fill="#6b7280" font-size="10">REST API · Async · JWT Auth · RBAC</text>

