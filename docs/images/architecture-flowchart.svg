    <rect x="340" y="750" width="100" height="48" rx="6" fill="#0c8ee9" fill-opacity="0.12" stroke="#0c8ee9" stroke-width="0.8"/>
    <text x="390" y="772" text-anchor="middle" fill="#38bdf8" font-size="10" font-weight="600">Products</text>
    <text x="390" y="787" text-anchor="middle" fill="#6b7280" font-size="8">CRUD · Cards</text>
